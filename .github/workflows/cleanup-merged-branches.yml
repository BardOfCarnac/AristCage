name: Clean merged branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-merged-branches.yml
  pull_request:
    types:
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged and fully absorbed branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          set -euo pipefail

          echo "## Branch cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          gh api --paginate --slurp "repos/$REPOSITORY/branches?per_page=100" \
            | jq -r 'flatten[] | [.name, (.protected | tostring)] | @tsv' \
            | while IFS=$'\t' read -r branch protected; do
                if [[ "$branch" == "$DEFAULT_BRANCH" ]]; then
                  continue
                fi

                if [[ "$protected" == "true" ]]; then
                  echo "KEPT protected: $branch"
                  echo "- Kept protected branch: \`$branch\`" >> "$GITHUB_STEP_SUMMARY"
                  continue
                fi

                open_count=$(gh api --paginate --slurp -X GET "repos/$REPOSITORY/pulls" \
                  -f state=open -f head="$OWNER:$branch" -f per_page=100 \
                  | jq 'flatten | length')
                if (( open_count > 0 )); then
                  echo "KEPT open PR: $branch"
                  echo "- Kept branch with an open pull request: \`$branch\`" >> "$GITHUB_STEP_SUMMARY"
                  continue
                fi

                merged_count=$(gh api --paginate --slurp -X GET "repos/$REPOSITORY/pulls" \
                  -f state=closed -f head="$OWNER:$branch" -f per_page=100 \
                  | jq '[flatten[] | select(.merged_at != null)] | length')

                compare_ref=$(python3 - "$DEFAULT_BRANCH" "$branch" <<'PY'
import sys
from urllib.parse import quote
print(quote(f"{sys.argv[1]}...{sys.argv[2]}", safe=""))
PY
                )
                ahead_by=$(gh api "repos/$REPOSITORY/compare/$compare_ref" --jq '.ahead_by' 2>/dev/null || echo 1)

                reason=""
                if (( merged_count > 0 )); then
                  reason="merged pull request"
                elif [[ "$ahead_by" == "0" ]]; then
                  reason="fully absorbed into $DEFAULT_BRANCH"
                else
                  echo "KEPT unique commits: $branch"
                  echo "- Kept branch with unique unmerged commits: \`$branch\`" >> "$GITHUB_STEP_SUMMARY"
                  continue
                fi

                encoded_branch=$(python3 - "$branch" <<'PY'
import sys
from urllib.parse import quote
print(quote(sys.argv[1], safe=""))
PY
                )
                gh api --method DELETE "repos/$REPOSITORY/git/refs/heads/$encoded_branch"
                echo "DELETED $branch — $reason"
                echo "- Deleted \`$branch\` — $reason" >> "$GITHUB_STEP_SUMMARY"
              done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The default branch, protected branches, open-PR branches, and branches with unique unmerged commits were preserved." >> "$GITHUB_STEP_SUMMARY"
