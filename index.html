<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Night City News</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/chamber.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/header-occlusion.css" />
  <link rel="stylesheet" href="css/entries.css" />
  <link rel="stylesheet" href="css/projection.css" />
  <link rel="stylesheet" href="css/depth-corners.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/diagnostics.css" />
</head>

<body>
  <div class="viewer">
    <div class="chamber" aria-hidden="true">
      <div class="chamber-plane chamber-rear"></div>
      <div class="chamber-plane chamber-wall chamber-wall-top"></div>
      <div class="chamber-plane chamber-wall chamber-wall-right"></div>
      <div class="chamber-plane chamber-wall chamber-wall-bottom"></div>
      <div class="chamber-plane chamber-wall chamber-wall-left"></div>
    </div>

    <header class="rail">
      <div class="rail-mark">NCN</div>

      <div class="rail-title">
        <strong>Night City News</strong>
        <span>14.07.2045 / v1.0</span>
      </div>

      <nav class="rail-actions" aria-label="Feed controls">
        <button type="button" data-panel="filter">Filter</button>
        <button type="button" data-panel="submit">Submit</button>
      </nav>
    </header>

    <div class="rail-occlusion" aria-hidden="true"></div>

    <main class="app">
      <section class="feed" id="feed" aria-label="Projected feed"></section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/chamber.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/projection-engine.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/app.js"></script>
  <script src="js/diagnostics.js"></script>
</body>
</html>
