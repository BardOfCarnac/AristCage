<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Night City News</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/header-occlusion.css" />
  <link rel="stylesheet" href="css/entries.css" />
  <link rel="stylesheet" href="css/projection.css" />
  <link rel="stylesheet" href="css/projection-cohesion.css" />
  <link rel="stylesheet" href="css/priority-palette.css" />
  <link rel="stylesheet" href="css/panel-projection.css" />
  <link rel="stylesheet" href="css/depth-corners.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/controls.css" />
  <link rel="stylesheet" href="css/selector-focus.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/diagnostics.css" />
  <link rel="stylesheet" href="css/ui-cohesion.css" />
  <link rel="stylesheet" href="css/ui-polish.css" />
  <link rel="stylesheet" href="css/refactor-52.css" />
  <link rel="stylesheet" href="css/selector-interaction-fix.css" />

  <link rel="stylesheet" href="css/panel-stability-mobile-details.css" />
  <link rel="stylesheet" href="css/story-metadata-polish.css" />
</head>

<body>
  <div class="viewer">
    <header class="rail">
      <div class="rail-mark">NCN</div>
      <div class="rail-title">
        <strong>Night City News</strong>
        <span>14.07.2045 / v1.0</span>
      </div>
      <nav class="rail-actions" aria-label="Feed controls">
        <button type="button" data-panel="filter" aria-pressed="false">Filter</button>
        <button type="button" data-panel="submit" aria-pressed="false">Submit</button>
      </nav>
    </header>

    <div class="rail-occlusion" aria-hidden="true"></div>

    <main class="app">
      <div class="app-shell">
        <section class="feed" id="feed" aria-label="Projected feed"></section>
        <aside class="desktop-inspector" id="desktop-inspector" aria-label="Selected transmission"></aside>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/story-metadata-polish.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/projection-engine.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/ui-polish.js"></script>
  <script src="js/selector-interaction-fix.js"></script>
  <script src="js/dropdown-unification.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/app.js"></script>
  <script src="js/priority-palette.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/diagnostics.js"></script>
</body>
</html>
