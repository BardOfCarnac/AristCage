<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Night City News</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/rail.css" />
  <link rel="stylesheet" href="css/header-occlusion.css" />
  <link rel="stylesheet" href="css/entries.css" />
  <link rel="stylesheet" href="css/projection.css" />
  <link rel="stylesheet" href="css/projection-cohesion.css" />
  <link rel="stylesheet" href="css/priority-palette.css" />
  <link rel="stylesheet" href="css/panel-projection.css" />
  <link rel="stylesheet" href="css/depth-corners.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/controls.css" />
  <link rel="stylesheet" href="css/selector-focus.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/diagnostics.css" />
  <link rel="stylesheet" href="css/ui-cohesion.css" />
  <link rel="stylesheet" href="css/ui-polish.css" />
  <link rel="stylesheet" href="css/refactor-52.css" />
  <link rel="stylesheet" href="css/selector-interaction-fix.css" />
  <link rel="stylesheet" href="css/dropdown-unification.css" />
  <link rel="stylesheet" href="css/panel-stability-mobile-details.css" />
  <link rel="stylesheet" href="css/story-metadata-polish.css" />
  <link rel="stylesheet" href="css/effects.css" />
  <link rel="stylesheet" href="css/instrumentation.css" />
  <link rel="stylesheet" href="css/selector-panel-corrections.css" />
  <link rel="stylesheet" href="css/final-interaction-polish.css" />
  <link rel="stylesheet" href="css/layered-chamber.css" />
  <link rel="stylesheet" href="css/heuristic-rangefinder.css?v=front-stack-12" data-optional-module="heuristic-rangefinder" />
  <link rel="stylesheet" href="css/optical-projection.css?v=dark-edge-plate-1" data-optional-module="optical-projection" />
  <link rel="stylesheet" href="css/optical-three-plane-profile.css?v=priority-clear-1" data-optional-module="optical-projection" />
</head>

<body>
  <div class="viewer">
    <header class="rail">
      <div class="rail-mark">NCN</div>
      <div class="rail-title">
        <strong>Night City News</strong>
        <span>14.07.2045 / v1.0</span>
      </div>
      <nav class="rail-actions" aria-label="Feed controls">
        <button type="button" data-panel="filter" aria-pressed="false">Filter</button>
        <button type="button" data-panel="submit" aria-pressed="false">Submit</button>
        <button type="button" class="layered-chamber-toggle" id="layered-chamber-toggle" aria-pressed="false" title="Toggle layered chamber projection">Chamber Off</button>
        <button type="button" class="heuristic-rangefinder-toggle" id="heuristic-rangefinder-toggle" aria-pressed="false" title="Toggle heuristic image rangefinder">Range Off</button>
        <button type="button" class="optical-toggle" id="optical-projection-toggle" aria-pressed="false" title="Toggle the additional optical projection mode">Optics Off</button>
      </nav>
    </header>

    <div class="rail-occlusion" aria-hidden="true"></div>

    <main class="app">
      <div class="app-shell">
        <section class="feed" id="feed" aria-label="Projected feed"></section>
        <aside class="desktop-inspector" id="desktop-inspector" aria-label="Selected transmission"></aside>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/story-metadata-polish.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/selector-panel-corrections.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/projection-engine.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/ui-polish.js"></script>
  <script src="js/selector-interaction-fix.js"></script>
  <script src="js/dropdown-unification.js"></script>
  <script src="js/calibration-markers.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/app.js"></script>
  <script src="js/priority-palette.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/layered-chamber.js?v=native-breath-1"></script>
  <script src="js/chamber-camera.js?v=semantic-panes-3"></script>
  <script src="js/optical-port-map.js?v=soft-perspective-1"></script>
  <script src="js/heuristic-rangefinder.js?v=front-stack-12" data-optional-module="heuristic-rangefinder"></script>
  <script src="js/optical-projection.js?v=semantic-three-ports-2" data-optional-module="optical-projection"></script>
  <script src="js/diagnostics.js?v=shared-camera-1"></script>
</body>
</html>
